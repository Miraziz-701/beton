<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Asosiy Ma’lumot Qo‘shish (Demo)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f0f2f5;padding:40px">

<div class="container bg-white p-4 rounded shadow" style="max-width:750px">

  <h4 class="text-success mb-4">Asosiy Ma’lumot Qo‘shish (Front-end demo)</h4>

  <form>

    <!-- Jo‘natuvchi -->
    <div class="mb-3">
      <label class="form-label">Kim tomonidan jo'natilgani</label>
      <input type="text" class="form-control"
             value="Ali Trans">
    </div>

    <!-- Mijoz -->
    <div class="mb-3">
      <label class="form-label">Mijoz</label>
      <input type="text" class="form-control"
             value="Samarqand Qurilish MChJ">
    </div>

    <!-- Obyekt -->
    <div class="mb-3">
      <label class="form-label">Obyekt</label>
      <input type="text" class="form-control"
             value="Yangi Turar-joy Majmuasi (YTM-3)">
    </div>

    <!-- Marka -->
    <div class="mb-3">
      <label class="form-label">Markasi</label>
      <select class="form-select">
        <option>M200</option>
        <option selected>M300</option>
        <option>M400</option>
        <option>xomashyo_shag'al</option>
      </select>
    </div>

    <!-- Izoh -->
    <div class="mb-3">
      <label class="form-label">Izoh</label>
      <textarea class="form-control" rows="2">Shag‘al sifatli, quruq holatda</textarea>
    </div>

    <!-- Miqdorlar -->
    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">Qog‘ozdagi mahsulot</label>
        <input type="number" class="form-control" value="24">
      </div>
      <div class="col-md-6">
        <label class="form-label">Real mahsulot</label>
        <input type="number" step="0.1" class="form-control" value="23.5">
      </div>
    </div>

    <!-- Kamera -->
    <div class="mb-3">
      <label class="form-label">Kamera</label>
      <select class="form-select">
        <option selected>Zavod kamera 1</option>
        <option>Zavod kamera 2</option>
      </select>
    </div>

    <!-- Mashina -->
    <div class="mb-4">
      <label class="form-label">Mashina</label>
      <input type="text" class="form-control"
             value="01 A 123 AB">
    </div>

    <!-- Tugmalar -->
    <div class="d-flex justify-content-between">
      <button type="button" class="btn btn-outline-secondary">← Orqaga</button>
      <button type="button" class="btn btn-success">
        ✅ Saqlash (demo)
      </button>
    </div>

  </form>

</div>

</body>
</html>
