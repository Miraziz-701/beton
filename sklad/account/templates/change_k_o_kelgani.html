<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Jonatuvchini O'zgartirish</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    html, body {
      height: 100%;
      background-color: #f8f9fa;
      margin: 0;
    }

    .form-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .form-card {
      width: 100%;
      max-width: 600px;
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }

    .form-title {
      margin-bottom: 30px;
      font-weight: 600;
      color: #198754;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 24px;
    }

    .submit-btn {
      font-size: 18px;
      padding: 12px 40px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <div class="form-wrapper">
    <div class="form-card">
      <h4 class="form-title">👤 Jo'natuvchini O'zgartirish</h4>
      <form method="post" action="">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Ism Familya</label>
          {{ form.ism_familya }}
        </div>

        <!-- Avvalgi sahifaga qaytish uchun -->
        <input type="hidden" name="next" value="{{ request.GET.next|default:request.META.HTTP_REFERER }}">

        <div class="text-center mt-4">
          <button type="submit" class="btn btn-success submit-btn">
            💾 Saqlash
          </button>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
