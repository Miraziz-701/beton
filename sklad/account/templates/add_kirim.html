<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirim Qo‘shish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-box {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 50px;
        }
        .form-title {
            font-weight: bold;
            color: #28a745;
            text-align: center;
            margin-bottom: 25px;
        }

        .form-check-inline {
            display: inline-flex;
            align-items: center;
            margin-right: 15px;
        }

        .form-check-input {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #999;
            margin-right: 12px;   /* ⬅️ bu yer bo‘shliqni oshiradi */
        }

            /* N va P bloklari orasidagi masofa */
        #checkedGroup {
            display: flex;
            align-items: center;
            gap: 28px;            /* ⬅️ ikki variant orasidagi masofa */
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-box">
        <h3 class="form-title">➕ Yangi Kirim Qo‘shish</h3>

        <form action="{% url 'add_kirim' %}" method="post">
            {% csrf_token %}
            <!-- Turi -->
            <div class="mb-3">
                <label class="form-label" for="{{ form.turi.id_for_label }}">Kirim Turi</label>
                {{ form.turi }}
            </div>

            <!-- Xaridor -->
            <!-- <div class="mb-3">
                <label class="form-label" for="{{ form.k_o_kelgani.id_for_label }}">Kim orqali kelgani</label>
                {{ form.k_o_kelgani }}
                <div class="mt-2">
                    <a href="{% url 'add_all' 4 %}?next={{ request.path }}" class="btn btn-outline-primary btn-sm">
                        ➕ Yangi jonatuvchi qo‘shish
                    </a>
                    <a href="#" id="editBtn" class="btn btn-outline-warning btn-sm" style="display:none;">
                        ✏️ Jo'natuvchini o'zgartirish
                    </a>
                </div>
            </div> -->

            <!-- Summasi -->
            <div class="mb-3">
                <label class="form-label" for="summa">Summasi (so'm)</label>
                {{ form.summa }}
            </div>

            <!-- Izoh -->
            <div class="mb-3">
                <label class="form-label" for="{{ form.izoh.id_for_label }}">Izoh</label>
                {{ form.izoh }}
            </div>

            <!-- Checked -->
            <div class="mb-3">
                <label class="form-label">To‘lov Turi</label>
                <div id="checkedGroup">
                    {% for value, label in form.checked.field.choices %}
                    <div class="form-check form-check-inline m-0">
                        <input class="form-check-input" type="radio"
                            name="{{ form.checked.name }}" value="{{ value }}"
                            id="id_checked_{{ forloop.counter }}">
                        <label class="form-check-label" for="id_checked_{{ forloop.counter }}">{{ label }}</label>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <div class="mb-3">
                <button type="button" class="btn btn-outline-primary" id="toggleDateBtn">
                    Sanani o‘zgartirish
                </button>
                <div id="dateFieldWrapper" style="display:none; margin-top:10px;">
                    {{ form.sana }}
                </div>
            </div>


            <!-- Saqlash tugmasi -->
            <div class="text-center">
                <button type="submit" class="btn btn-success px-4">💾 Saqlash</button>
                <a href="{% url 'kirim_hisobot' %}" class="btn btn-secondary px-4">⬅️ Orqaga</a>
            </div>
        </form>
    </div>
</div>

</body>

<script>
    document.getElementById('toggleDateBtn').addEventListener('click', function() {
        const wrapper = document.getElementById('dateFieldWrapper');
        wrapper.style.display = wrapper.style.display === 'none' ? 'block' : 'none';
    });

    document.getElementById('k_o_kelganiSelect').addEventListener('change', function() {
        let selectedId = this.value;
        let editBtn = document.getElementById('editBtn');

        if (selectedId) {
            // Hozirgi formadagi barcha qiymatlarni URL query qilib yig'ish
            let params = new URLSearchParams(new FormData(document.querySelector('form'))).toString();
            editBtn.href = `/change/jonatuvchi/${selectedId}/?` + params;
            editBtn.style.display = 'inline-block';
        } else {
            editBtn.style.display = 'none';
        }
    });

    document.addEventListener('DOMContentLoaded', function() {
        const summaInput = document.getElementById('summa');

        summaInput.addEventListener('input', function(e) {
            let cursorPos = e.target.selectionStart;
            let rawValue = e.target.value.replace(/\D/g, ''); // faqat raqamlar
            let formatted = rawValue.replace(/\B(?=(\d{3})+(?!\d))/g, ' '); // 3 raqamdan keyin bo‘sh joy
            
            e.target.value = formatted;

            let diff = formatted.length - rawValue.length;
            e.target.selectionStart = cursorPos + diff;
            e.target.selectionEnd = cursorPos + diff;
        });
    });
</script>

</html>
