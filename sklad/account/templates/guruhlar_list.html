{% load static %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <a href="{% url 'home' %}" class="btn btn-outline-secondary">
                    ← Orqaga
        </a>
        <h2 class="mb-0">🚚 Guruhlar ro‘yxati</h2>
        <a href="{% url 'add_xojayin' %}" class="btn btn-success">
            <i class="fas fa-plus"></i> Egasini qo'shish
        </a>
    </div>

    {% for row in rows %}
    <div class="card mb-3 shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center bg-primary text-white">
            <strong>{{ row.name }}</strong>
            {% if row.pk %}
            <a href="{% url 'mashina_qoshish' row.pk %}" class="btn btn-light btn-sm">Mashina qo‘shish</a>
            {% else %}
            <span class="btn btn-light btn-sm disabled">Id topilmadi</span>
            {% endif %}
        </div>
        <div class="card-body">
            {% for m in row.mashinalar %}
            <span class="badge bg-secondary me-1 mb-1 p-2">{{ m.mashina_raqami }}</span>
            {% empty %}
            <span class="text-muted">Mashinalar yo‘q</span>
            {% endfor %}
        </div>
    </div>
    {% endfor %}
</div>

<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
