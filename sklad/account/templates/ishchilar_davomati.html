<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishchilar Davomati</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .status-badge {
            font-size: 0.9rem;
            padding: 6px 12px;
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <div class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">📋 Ishchilar Davomati</h2>
            <div>
                <a href="{% url 'ishchilar_royxati' %}" class="btn btn-sm btn-outline-dark me-2">Ishchilar royxati</a>
                <a href="{% url 'add_kelmagan_ishchi' %}" class="btn btn-sm btn-outline-danger">Kelmaganlarni qo‘shish</a>
                <a href="{% url 'umumiy_chiqim' %}" class="btn btn-outline-secondary btn-sm">⬅️ Ortga</a>
            </div>
        </div>

        <table class="table table-bordered table-hover shadow-sm bg-white">
            <thead class="table-dark">
                <tr>
                    <th class="text-center">Ism Familiya</th>
                    <th class="text-center">Izoh</th>
                    <th class="text-center">Holati</th>
                    <th class="text-center">Sana</th>
                </tr>
            </thead>
            <tbody>
                {% for kelmagan in kelmaganlar %}
                    <tr>
                        <td class="text-center">{{ kelmagan.ishchi }}</td>
                        <td class="text-center">
                            {% if kelmagan.izoh %}
                                {{ kelmagan.izoh }}
                            {% else %}

                            {% endif %}
                        </td>
                        <td class="text-center">
                            <span class="badge bg-danger status-badge">❌ Kelmagan</span>
                        </td>
                        <td class="text-center">{{ kelmagan.sana|date:"d-m-Y" }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>


    </div>
</body>

</html>
