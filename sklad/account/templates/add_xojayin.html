<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xojayini qo‘shish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">➕ Egasini qo‘shish</h4>
            </div>
            <div class="card-body">
                <form action="{% url 'add_xojayin' %}" , method="post">
                    {% csrf_token %}
                    <!-- Xojayini nomi -->
                    <div class="mb-3">
                        <label for="{{ form.xojayini.id_for_label }}" class="form-label">Egasi</label>
                        {{ form.xojayini }}
                    </div>

                    <!-- Saqlash tugmasi -->
                    <button type="submit" class="btn btn-success">Saqlash</button>
                    <a href="#" class="btn btn-secondary">Bekor qilish</a>
                </form>
            </div>
        </div>
    </div>

</body>

</html>
