<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Ishchi qo‘shish</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
  <div class="card shadow-lg rounded-3">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">Ishchi qo‘shish</h4>
    </div>
    <div class="card-body">
      <form method="post" action="{% url 'add_ishchi' %}">
        {% csrf_token %}
        
        <!-- Ism -->
        <div class="mb-3">
          <label for="{{ form.ism_familya.id_for_label }}" class="form-label">Ism Familya</label>
          {{ form.ism_familya }}
        </div>

        <!-- Oyligi -->
        <div class="mb-3">
          <label for="{{ form.oyligi.id_for_label }}" class="form-label">Oyligi</label>
          {{ form.oyligi }}
        </div>

        <!-- Oylik boshlanishi -->
        <div class="mb-3">
          <label class="form-label">Oylik boshlanishi</label>
          <div class="d-flex align-items-center gap-3">
            <button type="button" class="btn btn-sm btn-outline-primary" id="toggleDate">
              📅 Vaqtni o‘zgartirish
            </button>
          </div>

          <div id="dateField" class="mt-2 d-none">
            {{ form.qachondan_olishi }}
          </div>
        </div>

        <!-- Tugmalar -->
        <div class="d-flex justify-content-end gap-2">
          <a href="{% url 'ishchilar_davomati' %}" class="btn btn-outline-secondary">Bekor qilish</a>
          <button type="submit" class="btn btn-success">💾 Saqlash</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  const toggleBtn = document.getElementById("toggleDate");
  const dateField = document.getElementById("dateField");
  const bugundan = document.getElementById("bugundan");
  const dateInput = document.getElementById("id_qachondan_olishi");
  const oylikInput = document.getElementById("oyligi");
  // Oylik input - 3 xonadan keyin probel qo‘yish
  oylikInput.addEventListener("input", function (e) {
    let value = e.target.value.replace(/\s/g, "");
    if (!isNaN(value) && value !== "") {
      e.target.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    }
  });
  
  // bugungi sanani olish
  function todayDate() {
      const today = new Date();
      return today.toISOString().split("T")[0]; // YYYY-MM-DD format
  }

  // "Vaqtni o‘zgartirish" bosilganda
  toggleBtn.addEventListener("click", function () {
    dateField.classList.toggle("d-none");
    if (!dateField.classList.contains("d-none")) {
      bugundan.checked = false; // chiqsa -> bugundan avtomatik o‘chadi
      dateInput.value = "";     // foydalanuvchi tanlashi uchun bo‘sh
    }
  });

  // "Bugundan" checkbox bosilganda
  bugundan.addEventListener("change", function () {
    if (bugundan.checked) {
      dateField.classList.add("d-none"); 
      dateInput.value = todayDate(); // bugungi sana avtomatik beriladi
    }
  });

</script>

</body>
</html>
